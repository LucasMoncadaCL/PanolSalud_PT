services:
  postgres:
    image: postgres:16-alpine
    container_name: panol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-panol}
      POSTGRES_USER: ${DB_USER:-panol_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-panol_user} -d ${DB_NAME:-panol}"]
      interval: 10s
      timeout: 5s
      retries: 5
    secrets:
      - db_password

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: panol-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      DB_HOST: postgres
    volumes:
      - ./secrets:/app/secrets:ro
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres_data:

secrets:
  db_password:
    file: ./secrets/db_password.txt