spring:
  application:
    name: backendpanol
  data:
    mongodb:
      uri: ${MONGODB_URI}
  profiles:
    active: ${APP_DB_ENV:docker}
  config:
    import: optional:file:./secrets/application-secrets.properties
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: supabase-existing-schema-baseline
    validate-on-migrate: true
  jooq:
    sql-dialect: POSTGRES
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:${SUPABASE_URL:${VITE_SUPABASE_URL:https://ekqbucfoygimzgxupdhm.supabase.co}}/auth/v1}

server:
  port: ${APP_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_DOCKER_HOST:${DB_HOST:localhost}}:${DB_DOCKER_PORT:${DB_PORT:5432}}/${DB_DOCKER_NAME:${DB_NAME:panol}}?sslmode=${DB_DOCKER_SSL_MODE:${DB_SSL_MODE:disable}}
    username: ${DB_DOCKER_USER:${DB_USER:postgres}}
    password: ${DB_DOCKER_PASSWORD:${DB_PASSWORD:postgres}}

---
spring:
  config:
    activate:
      on-profile: supabase
  datasource:
    url: jdbc:postgresql://${DB_SUPABASE_HOST:${DB_HOST:aws-1-us-east-1.pooler.supabase.com}}:${DB_SUPABASE_PORT:${DB_PORT:5432}}/${DB_SUPABASE_NAME:${DB_NAME:postgres}}?sslmode=${DB_SUPABASE_SSL_MODE:${DB_SSL_MODE:require}}
    username: ${DB_SUPABASE_USER:${DB_USER:postgres}}
    password: ${DB_SUPABASE_PASSWORD:${DB_PASSWORD:postgres}}
