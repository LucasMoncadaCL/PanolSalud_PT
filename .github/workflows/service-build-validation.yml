name: Service Build Validation

on:
  pull_request:

jobs:
  build-services:
    name: Build Backend and Frontend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: panol_ci
          POSTGRES_PASSWORD: panol_ci
          POSTGRES_DB: panol_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U panol_ci -d panol_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Producto/frontendpanol/package-lock.json

      - name: Initialize schema for jOOQ codegen
        env:
          PGPASSWORD: panol_ci
        run: |
          psql -h 127.0.0.1 -U panol_ci -d panol_ci <<'SQL'
          CREATE TYPE item_type_enum AS ENUM ('consumable','reusable','individual');

          CREATE TABLE IF NOT EXISTS category (
            id SERIAL PRIMARY KEY,
            name VARCHAR(150) NOT NULL UNIQUE,
            description TEXT,
            active BOOLEAN NOT NULL DEFAULT TRUE,
            created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
          );

          CREATE TABLE IF NOT EXISTS location (
            id SERIAL PRIMARY KEY,
            name VARCHAR(150) NOT NULL,
            description TEXT
          );

          CREATE TABLE IF NOT EXISTS implement (
            id SERIAL PRIMARY KEY,
            name VARCHAR(150) NOT NULL UNIQUE,
            description TEXT,
            category_id INTEGER REFERENCES category(id),
            location_id INTEGER REFERENCES location(id),
            item_type item_type_enum NOT NULL DEFAULT 'reusable',
            barcode VARCHAR(100),
            img_url TEXT,
            active BOOLEAN NOT NULL DEFAULT TRUE,
            created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
            observations VARCHAR(255)
          );

          CREATE TABLE IF NOT EXISTS stock (
            id SERIAL PRIMARY KEY,
            implement_id INTEGER NOT NULL UNIQUE REFERENCES implement(id),
            total_stock INTEGER NOT NULL DEFAULT 0,
            min_stock INTEGER NOT NULL DEFAULT 0,
            available INTEGER NOT NULL DEFAULT 0,
            reserved INTEGER NOT NULL DEFAULT 0,
            loaned INTEGER NOT NULL DEFAULT 0,
            damaged INTEGER NOT NULL DEFAULT 0,
            updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
          );
          SQL

      - name: Build backend
        env:
          JOOQ_DB_URL: jdbc:postgresql://127.0.0.1:5432/panol_ci
          JOOQ_DB_USER: panol_ci
          JOOQ_DB_PASSWORD: panol_ci
        run: |
          chmod +x ./mvnw
          ./mvnw -B -DskipTests package
        working-directory: Producto/backendpanol

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: Producto/frontendpanol

