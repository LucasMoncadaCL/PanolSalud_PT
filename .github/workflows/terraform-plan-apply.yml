name: Terraform Plan/Apply

on:
  push:
    branches: ["dev"]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-plan-apply.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      apply:
        description: "Run terraform apply"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: "true"

jobs:
  terraform-dev:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: infra/terraform/environments/dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEV }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required inputs (dev)
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_DEV }}
          GCP_REGION: ${{ vars.GCP_REGION_DEV }}
          GCP_ARTIFACT_REGISTRY_LOCATION: ${{ vars.GCP_ARTIFACT_REGISTRY_LOCATION_DEV }}
          GCP_TFSTATE_BUCKET: ${{ vars.GCP_TFSTATE_BUCKET_DEV }}
          BACKEND_IMAGE: ${{ vars.BACKEND_IMAGE_DEV }}
          FRONTEND_IMAGE: ${{ vars.FRONTEND_IMAGE_DEV }}
          SUPABASE_DB_HOST: ${{ vars.SUPABASE_DB_HOST_DEV }}
          SUPABASE_DB_PORT: ${{ vars.SUPABASE_DB_PORT_DEV }}
          SUPABASE_DB_NAME: ${{ vars.SUPABASE_DB_NAME_DEV }}
          SUPABASE_DB_USER: ${{ vars.SUPABASE_DB_USER_DEV }}
          APP_AUTH_JWT_ISSUER: ${{ vars.APP_AUTH_JWT_ISSUER_DEV }}
          APP_AUTH_JWT_EXPIRATION_SECONDS: ${{ vars.APP_AUTH_JWT_EXPIRATION_SECONDS_DEV }}
          JWT_ISSUER_URI: ${{ vars.JWT_ISSUER_URI_DEV }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY_DEV }}
          DB_SUPABASE_PASSWORD: ${{ secrets.DB_SUPABASE_PASSWORD_DEV }}
          MONGODB_URI: ${{ secrets.MONGODB_URI_DEV }}
          APP_AUTH_JWT_SECRET: ${{ secrets.APP_AUTH_JWT_SECRET_DEV }}
        run: |
          set -euo pipefail
          required=(
            GCP_PROJECT_ID GCP_REGION GCP_ARTIFACT_REGISTRY_LOCATION GCP_TFSTATE_BUCKET
            BACKEND_IMAGE FRONTEND_IMAGE SUPABASE_DB_HOST SUPABASE_DB_PORT SUPABASE_DB_NAME SUPABASE_DB_USER
            APP_AUTH_JWT_ISSUER APP_AUTH_JWT_EXPIRATION_SECONDS JWT_ISSUER_URI VITE_SUPABASE_PUBLISHABLE_KEY
            DB_SUPABASE_PASSWORD MONGODB_URI APP_AUTH_JWT_SECRET
          )
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required value: $key" >&2
              exit 1
            fi
          done

      - name: Terraform fmt
        run: terraform fmt -check -recursive ../../

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.GCP_TFSTATE_BUCKET_DEV }}" \
            -backend-config="prefix=terraform/state"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan (dev)
        env:
          TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID_DEV }}
          TF_VAR_region: ${{ vars.GCP_REGION_DEV }}
          TF_VAR_environment: dev
          TF_VAR_artifact_registry_location: ${{ vars.GCP_ARTIFACT_REGISTRY_LOCATION_DEV }}
          TF_VAR_backend_image: ${{ vars.BACKEND_IMAGE_DEV }}
          TF_VAR_frontend_image: ${{ vars.FRONTEND_IMAGE_DEV }}
          TF_VAR_supabase_db_host: ${{ vars.SUPABASE_DB_HOST_DEV }}
          TF_VAR_supabase_db_port: ${{ vars.SUPABASE_DB_PORT_DEV }}
          TF_VAR_supabase_db_name: ${{ vars.SUPABASE_DB_NAME_DEV }}
          TF_VAR_supabase_db_user: ${{ vars.SUPABASE_DB_USER_DEV }}
          TF_VAR_app_security_enabled: ${{ vars.APP_SECURITY_ENABLED_DEV }}
          TF_VAR_app_auth_max_failed_attempts: ${{ vars.APP_AUTH_MAX_FAILED_ATTEMPTS_DEV }}
          TF_VAR_app_auth_lock_minutes: ${{ vars.APP_AUTH_LOCK_MINUTES_DEV }}
          TF_VAR_app_auth_jwt_issuer: ${{ vars.APP_AUTH_JWT_ISSUER_DEV }}
          TF_VAR_app_auth_jwt_expiration_seconds: ${{ vars.APP_AUTH_JWT_EXPIRATION_SECONDS_DEV }}
          TF_VAR_jwt_issuer_uri: ${{ vars.JWT_ISSUER_URI_DEV }}
          TF_VAR_vite_supabase_publishable_key: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY_DEV }}
          TF_VAR_db_supabase_password_secret_value: ${{ secrets.DB_SUPABASE_PASSWORD_DEV }}
          TF_VAR_mongodb_uri_secret_value: ${{ secrets.MONGODB_URI_DEV }}
          TF_VAR_app_auth_jwt_secret_value: ${{ secrets.APP_AUTH_JWT_SECRET_DEV }}
          TF_VAR_runtime_sa_user_members: '["serviceAccount:${{ secrets.GCP_SERVICE_ACCOUNT_DEV }}"]'
          TF_VAR_backend_domain: ""
          TF_VAR_frontend_domain: ""
        run: terraform plan -out=tfplan

      - name: Terraform apply (dev)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.apply == true)
        run: terraform apply -auto-approve tfplan

  terraform-prod:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: infra/terraform/environments/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_PROD }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_PROD }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required inputs (prod)
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_PROD }}
          GCP_REGION: ${{ vars.GCP_REGION_PROD }}
          GCP_ARTIFACT_REGISTRY_LOCATION: ${{ vars.GCP_ARTIFACT_REGISTRY_LOCATION_PROD }}
          GCP_TFSTATE_BUCKET: ${{ vars.GCP_TFSTATE_BUCKET_PROD }}
          BACKEND_IMAGE: ${{ vars.BACKEND_IMAGE_PROD }}
          FRONTEND_IMAGE: ${{ vars.FRONTEND_IMAGE_PROD }}
          SUPABASE_DB_HOST: ${{ vars.SUPABASE_DB_HOST_PROD }}
          SUPABASE_DB_PORT: ${{ vars.SUPABASE_DB_PORT_PROD }}
          SUPABASE_DB_NAME: ${{ vars.SUPABASE_DB_NAME_PROD }}
          SUPABASE_DB_USER: ${{ vars.SUPABASE_DB_USER_PROD }}
          APP_AUTH_JWT_ISSUER: ${{ vars.APP_AUTH_JWT_ISSUER_PROD }}
          APP_AUTH_JWT_EXPIRATION_SECONDS: ${{ vars.APP_AUTH_JWT_EXPIRATION_SECONDS_PROD }}
          JWT_ISSUER_URI: ${{ vars.JWT_ISSUER_URI_PROD }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY_PROD }}
          DB_SUPABASE_PASSWORD: ${{ secrets.DB_SUPABASE_PASSWORD_PROD }}
          MONGODB_URI: ${{ secrets.MONGODB_URI_PROD }}
          APP_AUTH_JWT_SECRET: ${{ secrets.APP_AUTH_JWT_SECRET_PROD }}
        run: |
          set -euo pipefail
          required=(
            GCP_PROJECT_ID GCP_REGION GCP_ARTIFACT_REGISTRY_LOCATION GCP_TFSTATE_BUCKET
            BACKEND_IMAGE FRONTEND_IMAGE SUPABASE_DB_HOST SUPABASE_DB_PORT SUPABASE_DB_NAME SUPABASE_DB_USER
            APP_AUTH_JWT_ISSUER APP_AUTH_JWT_EXPIRATION_SECONDS JWT_ISSUER_URI VITE_SUPABASE_PUBLISHABLE_KEY
            DB_SUPABASE_PASSWORD MONGODB_URI APP_AUTH_JWT_SECRET
          )
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required value: $key" >&2
              exit 1
            fi
          done

      - name: Terraform fmt
        run: terraform fmt -check -recursive ../../

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.GCP_TFSTATE_BUCKET_PROD }}" \
            -backend-config="prefix=terraform/state"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan (prod)
        env:
          TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID_PROD }}
          TF_VAR_region: ${{ vars.GCP_REGION_PROD }}
          TF_VAR_environment: prod
          TF_VAR_artifact_registry_location: ${{ vars.GCP_ARTIFACT_REGISTRY_LOCATION_PROD }}
          TF_VAR_backend_image: ${{ vars.BACKEND_IMAGE_PROD }}
          TF_VAR_frontend_image: ${{ vars.FRONTEND_IMAGE_PROD }}
          TF_VAR_supabase_db_host: ${{ vars.SUPABASE_DB_HOST_PROD }}
          TF_VAR_supabase_db_port: ${{ vars.SUPABASE_DB_PORT_PROD }}
          TF_VAR_supabase_db_name: ${{ vars.SUPABASE_DB_NAME_PROD }}
          TF_VAR_supabase_db_user: ${{ vars.SUPABASE_DB_USER_PROD }}
          TF_VAR_app_security_enabled: ${{ vars.APP_SECURITY_ENABLED_PROD }}
          TF_VAR_app_auth_max_failed_attempts: ${{ vars.APP_AUTH_MAX_FAILED_ATTEMPTS_PROD }}
          TF_VAR_app_auth_lock_minutes: ${{ vars.APP_AUTH_LOCK_MINUTES_PROD }}
          TF_VAR_app_auth_jwt_issuer: ${{ vars.APP_AUTH_JWT_ISSUER_PROD }}
          TF_VAR_app_auth_jwt_expiration_seconds: ${{ vars.APP_AUTH_JWT_EXPIRATION_SECONDS_PROD }}
          TF_VAR_jwt_issuer_uri: ${{ vars.JWT_ISSUER_URI_PROD }}
          TF_VAR_vite_supabase_publishable_key: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY_PROD }}
          TF_VAR_db_supabase_password_secret_value: ${{ secrets.DB_SUPABASE_PASSWORD_PROD }}
          TF_VAR_mongodb_uri_secret_value: ${{ secrets.MONGODB_URI_PROD }}
          TF_VAR_app_auth_jwt_secret_value: ${{ secrets.APP_AUTH_JWT_SECRET_PROD }}
          TF_VAR_runtime_sa_user_members: '["serviceAccount:${{ secrets.GCP_SERVICE_ACCOUNT_PROD }}"]'
          TF_VAR_backend_domain: ""
          TF_VAR_frontend_domain: ""
        run: terraform plan -out=tfplan

      - name: Terraform apply (prod)
        if: inputs.apply == true
        run: terraform apply -auto-approve tfplan
