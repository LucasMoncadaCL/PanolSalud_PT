apiVersion: apps/v1
kind: Deployment
metadata:
  name: panol-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: panol-backend
  template:
    metadata:
      labels:
        app: panol-backend
    spec:
      containers:
        - name: panol-backend
          image: panol/backendpanol:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: panol-backend-config
            - secretRef:
                name: panol-backend-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10