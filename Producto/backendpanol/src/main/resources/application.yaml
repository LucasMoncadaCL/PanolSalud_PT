spring:
  application:
    name: backendpanol
  config:
    import: optional:file:./secrets/application-secrets.properties
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:panol}?sslmode=${DB_SSL_MODE:disable}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: supabase-existing-schema-baseline
    validate-on-migrate: true
  jooq:
    sql-dialect: POSTGRES
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:${SUPABASE_URL:${VITE_SUPABASE_URL:https://ekqbucfoygimzgxupdhm.supabase.co}}/auth/v1}

server:
  port: ${APP_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
